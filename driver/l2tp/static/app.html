<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>L2TP Accounts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #fff;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-light: #eff6ff;
      --success: #059669;
      --success-bg: #ecfdf5;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --text: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border: #e2e8f0;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    body.embedded { background: transparent; min-height: 0; }
    body.embedded .app { max-width: none; padding: 0 1.5rem 1.5rem; }
    body.embedded .accounts-page { box-shadow: none; border: none; border-radius: 0; border-top: 1px solid var(--border); padding-top: 1.5rem; background: transparent; }

    .app { max-width: 820px; margin: 0 auto; padding: 1.5rem; }
    .accounts-page { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow); overflow: hidden; }

    .accounts-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 0 0 1.25rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .accounts-toolbar h1 {
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .accounts-toolbar p {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }
    .btn-add {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.625rem 1.25rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.25);
    }
    .btn-add:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-add:active { transform: translateY(0); }
    .btn-add svg { width: 18px; height: 18px; }

    .alert-strip {
      padding: 0.875rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 220px;
      overflow-y: auto;
      animation: slideDown 0.25s ease;
    }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .alert-strip.ok { background: var(--success-bg); color: #047857; border: 1px solid #a7f3d0; }
    .alert-strip.err { background: var(--danger-bg); color: #b91c1c; border: 1px solid #fecaca; }

    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
    }
    .empty-state-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.25rem;
      background: var(--primary-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
    }
    .empty-state-icon svg { width: 32px; height: 32px; }
    .empty-state h2 {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    .empty-state p {
      font-size: 0.9375rem;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
    }

    .config-cards { display: flex; flex-direction: column; gap: 0.75rem; }
    .config-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .config-card:hover { border-color: #cbd5e1; box-shadow: var(--shadow-sm); }
    .config-card-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.25rem;
      flex-wrap: wrap;
    }
    .config-card-main {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .config-card-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-sm);
      background: linear-gradient(145deg, var(--primary) 0%, #3b82f6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      flex-shrink: 0;
    }
    .config-card-icon svg { width: 22px; height: 22px; }
    .config-card-info { min-width: 0; }
    .config-card-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.25rem;
    }
    .config-card-meta {
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }
    .config-card-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .btn-card {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.4rem 0.875rem;
      border-radius: var(--radius-sm);
      font-size: 0.8125rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-card-connect {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 2px 6px rgba(37, 99, 235, 0.2);
    }
    .btn-card-connect:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-card-connect:disabled { opacity: 0.65; cursor: not-allowed; }
    .btn-card-disconnect {
      background: var(--text-secondary);
      color: #fff;
    }
    .btn-card-disconnect:hover:not(:disabled) { opacity: 0.9; }
    .btn-card-disconnect:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-card-edit {
      background: var(--border);
      color: var(--text);
    }
    .btn-card-edit:hover { background: #cbd5e1; }
    .btn-card-del {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }
    .btn-card-del:hover { background: var(--danger-bg); }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1.5rem;
      backdrop-filter: blur(6px);
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-box {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.18);
      width: 100%;
      max-width: 440px;
      max-height: 90vh;
      overflow-y: auto;
      border: 1px solid var(--border);
      animation: modalIn 0.25s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.98) translateY(-10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-box h3 {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text);
    }
    .modal-body { padding: 1.5rem; }
    .form-section-title {
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      margin-top: 1rem;
    }
    .form-section-title:first-child { margin-top: 0; }
    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.35rem;
    }
    .field input {
      width: 100%;
      padding: 0.625rem 0.875rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.9375rem;
      font-family: inherit;
      background: var(--surface);
      transition: border-color 0.2s;
    }
    .field input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
    }
    .field input.error { border-color: var(--danger); }
    .modal-validation {
      font-size: 0.8125rem;
      color: #b91c1c;
      background: var(--danger-bg);
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius-sm);
      margin-bottom: 1rem;
      border: 1px solid #fecaca;
    }
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.875rem;
      color: var(--text);
    }
    .checkbox-label input { width: auto; }
    .field-psk.hidden { display: none !important; }
    .modal-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 0.625rem;
    }
    .btn-modal {
      padding: 0.5rem 1.25rem;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-modal-ghost { background: var(--border); color: var(--text); border: none; }
    .btn-modal-ghost:hover { background: #cbd5e1; }
    .btn-modal-primary { background: var(--primary); color: #fff; border: none; box-shadow: 0 2px 8px rgba(37, 99, 235, 0.25); }
    .btn-modal-primary:hover { background: var(--primary-hover); }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <div class="accounts-page">
      <div class="accounts-toolbar">
        <div>
          <h1>Configs</h1>
          <p>Manage L2TP VPN connections</p>
        </div>
        <button type="button" class="btn-add" id="addConfigBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add config
        </button>
      </div>

      <div id="msg" class="alert-strip hidden"></div>

      <div id="emptyState" class="empty-state hidden">
        <div class="empty-state-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <h2>No configs yet</h2>
        <p>Add your first VPN configuration to connect securely.</p>
        <button type="button" class="btn-add" id="emptyAddBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add config
        </button>
      </div>

      <div id="configList" class="config-cards"></div>
    </div>
  </div>

  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal-box" onclick="event.stopPropagation()">
      <h3 id="modalTitle">Add config</h3>
      <div class="modal-body">
        <div id="modalValidation" class="modal-validation hidden"></div>
        <div class="form-section-title">Connection</div>
        <div class="field">
          <label>Server name</label>
          <input type="text" id="mServerName" placeholder="My VPN">
        </div>
        <div class="field">
          <label>Server address</label>
          <input type="text" id="mServerAddress" placeholder="vpn.example.com">
        </div>
        <div class="form-section-title">Credentials</div>
        <div class="field">
          <label>Username</label>
          <input type="text" id="mUsername" placeholder="Your username">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="mPassword" placeholder="Your password">
        </div>
        <div class="field field-psk-toggle">
          <label class="checkbox-label">
            <input type="checkbox" id="mUsePsk" checked>
            <span>Use pre-shared key</span>
          </label>
        </div>
        <div class="field field-psk" id="fieldPsk">
          <label>Pre-shared key</label>
          <input type="password" id="mPsk" placeholder="PSK from your provider">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-modal btn-modal-ghost" id="modalCancel">Cancel</button>
        <button type="button" class="btn-modal btn-modal-primary" id="modalSave">Save</button>
      </div>
    </div>
  </div>

  <script>
    (function() { if (window.location.search.indexOf('embedded=1') !== -1) document.body.classList.add('embedded'); })();
    var API_BASE = '__API_BASE__';
    var configs = [];
    var editingIndex = -1;

    function show(el, on) {
      el.classList.toggle('hidden', !on);
    }
    function showMsg(text, isErr) {
      var m = document.getElementById('msg');
      m.textContent = text;
      m.className = 'alert-strip ' + (isErr ? 'err' : 'ok');
      show(m, true);
    }

    function loadConfigs() {
      fetch(API_BASE + '/config').then(function(r) { return r.json(); }).then(function(arr) {
        configs = Array.isArray(arr) ? arr : [];
        renderList();
      }).catch(function() { configs = []; renderList(); });
    }

    function renderList() {
      var list = document.getElementById('configList');
      var emptyState = document.getElementById('emptyState');
      if (configs.length === 0) {
        list.innerHTML = '';
        show(emptyState, true);
        notifyHeight();
        return;
      }
      show(emptyState, false);
      list.innerHTML = configs.map(function(c, i) {
        var name = c.server_name || 'Unnamed';
        var meta = [c.server_address, c.username].filter(Boolean).join(' \u2022 ');
        return '<div class="config-card" data-i="' + i + '">' +
          '<div class="config-card-inner">' +
            '<div class="config-card-main">' +
              '<div class="config-card-icon">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>' +
              '</div>' +
              '<div class="config-card-info">' +
                '<div class="config-card-name">' + escapeHtml(name) + '</div>' +
                (meta ? '<div class="config-card-meta">' + escapeHtml(meta) + '</div>' : '') +
              '</div>' +
            '</div>' +
            '<div class="config-card-actions">' +
              '<button type="button" class="btn-card btn-card-connect btn-connect">Connect</button>' +
              '<button type="button" class="btn-card btn-card-disconnect">Disconnect</button>' +
              '<button type="button" class="btn-card btn-card-edit btn-edit">Edit</button>' +
              '<button type="button" class="btn-card btn-card-del btn-del">Delete</button>' +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');

      list.querySelectorAll('.btn-connect').forEach(function(btn) {
        btn.onclick = function() {
          if (this.disabled) return;
          var card = this.closest('.config-card');
          var i = parseInt(card.dataset.i, 10);
          var c = configs[i];
          var el = this;
          el.disabled = true;
          var oldText = el.textContent;
          el.textContent = 'Connecting...';
          showMsg('Connecting...', false);
          fetch(API_BASE + '/connect', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(c) })
            .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, d: d || {} }; }).catch(function() { return { ok: false, d: {} }; }); })
            .then(function(o) {
              var d = o.d;
              var log = (d && d.log) ? d.log.trim() : '';
              if (o.ok) showMsg(log ? 'Connected.\n\n' + log : 'Connected.', false);
              else showMsg((d && d.error) ? d.error + (log ? '\n\n' + log : '') : 'Connection failed.', true);
            })
            .catch(function() { showMsg('Connection failed.', true); })
            .finally(function() { el.disabled = false; el.textContent = oldText; });
        };
      });
      list.querySelectorAll('.btn-card-disconnect').forEach(function(btn) {
        btn.onclick = function() {
          if (this.disabled) return;
          var el = this;
          el.disabled = true;
          var oldText = el.textContent;
          el.textContent = 'Disconnecting...';
          showMsg('Disconnecting...', false);
          fetch(API_BASE + '/disconnect', { method: 'POST' })
            .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, d: d || {} }; }).catch(function() { return { ok: false, d: {} }; }); })
            .then(function(o) {
              if (o.ok) showMsg('Disconnected.', false);
              else showMsg((o.d && o.d.error) || 'Disconnect failed.', true);
            })
            .catch(function() { showMsg('Disconnect failed.', true); })
            .finally(function() { el.disabled = false; el.textContent = oldText; });
        };
      });
      list.querySelectorAll('.btn-edit').forEach(function(btn) {
        btn.onclick = function() { openModal(parseInt(btn.closest('.config-card').dataset.i, 10)); };
      });
      list.querySelectorAll('.btn-del').forEach(function(btn) {
        btn.onclick = function() {
          var i = parseInt(btn.closest('.config-card').dataset.i, 10);
          if (confirm('Delete this config?')) { configs.splice(i, 1); saveConfigs('Config deleted.'); renderList(); }
        };
      });
      notifyHeight();
    }
    function escapeHtml(s) {
      if (!s) return '';
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
    function openModal(index) {
      editingIndex = index;
      document.getElementById('modalTitle').textContent = index >= 0 ? 'Edit config' : 'Add config';
      var c = index >= 0 ? configs[index] : {};
      document.getElementById('mServerName').value = c.server_name || '';
      document.getElementById('mServerAddress').value = c.server_address || '';
      document.getElementById('mUsername').value = c.username || '';
      document.getElementById('mPassword').value = c.password || '';
      document.getElementById('mPsk').value = c.pre_shared_key || '';
      var usePsk = c.use_pre_shared_key !== false;
      document.getElementById('mUsePsk').checked = usePsk;
      document.getElementById('fieldPsk').classList.toggle('hidden', !usePsk);
      var v = document.getElementById('modalValidation');
      v.textContent = '';
      show(v, false);
      ['mServerName','mServerAddress','mUsername','mPassword','mPsk'].forEach(function(id) { var el = document.getElementById(id); if (el) el.classList.remove('error'); });
      show(document.getElementById('modalOverlay'), true);
    }
    function closeModal() {
      show(document.getElementById('modalOverlay'), false);
      editingIndex = -1;
    }
    function saveModal() {
      var name = document.getElementById('mServerName').value.trim();
      var address = document.getElementById('mServerAddress').value.trim();
      var user = document.getElementById('mUsername').value.trim();
      var pass = document.getElementById('mPassword').value;
      var usePsk = document.getElementById('mUsePsk').checked;
      var psk = document.getElementById('mPsk').value;
      var missing = [];
      if (!name) missing.push('Server name');
      if (!address) missing.push('Server address');
      if (!user) missing.push('Username');
      if (!pass) missing.push('Password');
      if (usePsk && !psk) missing.push('Pre-shared key');
      if (missing.length) {
        var v = document.getElementById('modalValidation');
        v.textContent = 'Please fill: ' + missing.join(', ');
        show(v, true);
        if (!name) document.getElementById('mServerName').classList.add('error');
        if (!address) document.getElementById('mServerAddress').classList.add('error');
        if (!user) document.getElementById('mUsername').classList.add('error');
        if (!pass) document.getElementById('mPassword').classList.add('error');
        if (usePsk && !psk) document.getElementById('mPsk').classList.add('error');
        return;
      }
      var c = { server_name: name, server_address: address, username: user, password: pass, use_pre_shared_key: usePsk, pre_shared_key: usePsk ? psk : '' };
      if (editingIndex >= 0) configs[editingIndex] = c;
      else configs.push(c);
      saveConfigs(editingIndex >= 0 ? 'Config updated.' : 'Config added.');
      renderList();
      closeModal();
    }
    function notifyHeight() {
      try {
        if (window.parent !== window) window.parent.postMessage({ type: 'vpn-iframe-height', height: document.documentElement.scrollHeight }, '*');
      } catch (e) {}
    }
    function saveConfigs(successMsg, errorMsg) {
      successMsg = successMsg || 'Saved.';
      errorMsg = errorMsg || 'Save failed.';
      fetch(API_BASE + '/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(configs) })
        .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, d: d }; }).catch(function() { return { ok: false, d: {} }; }); })
        .then(function(o) { showMsg(o.ok ? successMsg : (o.d && o.d.error) || errorMsg, !o.ok); })
        .catch(function() { showMsg(errorMsg, true); });
    }

    document.getElementById('addConfigBtn').onclick = function() { openModal(-1); };
    document.getElementById('emptyAddBtn').onclick = function() { openModal(-1); };
    document.getElementById('modalCancel').onclick = closeModal;
    document.getElementById('modalSave').onclick = saveModal;
    document.getElementById('modalOverlay').onclick = function(e) { if (e.target === this) closeModal(); };
    document.getElementById('mUsePsk').onchange = function() {
      document.getElementById('fieldPsk').classList.toggle('hidden', !this.checked);
    };

    loadConfigs();
  </script>
</body>
</html>
